repos:
  # --------------------------------------------------------------------------
  # Checks generales de archivos
  # --------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # --------------------------------------------------------------------------
  # Python — Estilo (PEP 8) y errores de sintaxis
  # --------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=120
          - --extend-ignore=E203,W503
          - --exclude=migrations,venv,.venv
        files: ^(gestion|inventory|TexCore|reporting_excel|printing_service|scanning_service)/

  # --------------------------------------------------------------------------
  # Seguridad — Análisis estático de vulnerabilidades Python
  # --------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args:
          - --severity-level=medium
          - --confidence-level=medium
          - -x
          - gestion/migrations,inventory/migrations,venv
        files: ^(gestion|inventory|reporting_excel|printing_service|scanning_service)/

  # --------------------------------------------------------------------------
  # Secrets — Prevenir commits con claves o credenciales hardcodeadas
  # --------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: >
          (?x)^(
            .*\.lock$|
            .*requirements.*\.txt$|
            package-lock\.json$
          )$

  # --------------------------------------------------------------------------
  # Conventional Commits — Estandariza mensajes de commit
  # Formato: tipo(scope): descripción
  # Tipos válidos: feat, fix, docs, style, refactor, test, chore, ci, perf
  # --------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - test
          - chore
          - ci
          - perf
          - revert
