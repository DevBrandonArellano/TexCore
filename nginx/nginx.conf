# Nota: no usar "upstream { server backend:8000 }" sin resolver dinámico: en Docker la IP del
# contenedor cambia al reiniciar el backend y Nginx seguiría la IP vieja → 502 en /api/.
# -------------------------------------------------------
# Rate Limiting Zones
# -------------------------------------------------------
# login_zone:   5 intentos/minuto por IP (protege /api/token/)
# refresh_zone: 10 intentos/minuto por IP (protege /api/token/refresh/)
# api_zone:     100 req/s por IP (protege el resto de la API)
limit_req_zone $binary_remote_addr zone=login_zone:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=refresh_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=100r/s;

server {
    listen 80;
    server_name localhost; # Or your domain name

    # En ambientes locales, el redirect a HTTPS con certificado self-signed
    # suele causar confusión (pantalla en blanco / warning).
    # Servimos el sitio también por HTTP para acceso inmediato en `http://localhost/`.

    # DNS embebido de Docker: re-resuelve backend/scanning cuando cambian de IP
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Autenticación — máximo 5 intentos/min, burst de 3
    location /api/token/ {
        limit_req zone=login_zone burst=3 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Refresh token — máximo 10 intentos/min
    location /api/token/refresh/ {
        limit_req zone=refresh_zone burst=5 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reportes Excel: proxy directo al microservicio con clave interna.
    location /api/reporting/ {
        proxy_pass http://reporting_excel:8002/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Key "dev-internal-secret-key-change-in-prod";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        set $django_upstream http://backend:8000;
        limit_req zone=api_zone burst=200 nodelay;
        limit_req_status 429;
        proxy_pass $django_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Mismo patrón: /api/scanning/foo → scanning:8000/foo
    location ~ ^/api/scanning/(.*)$ {
        set $scanning_upstream http://scanning:8000/$1;
        proxy_pass $scanning_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/django_static/;
        try_files $uri @react_static_http;
    }

    location @react_static_http {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}

# Main server block for HTTPS traffic
server {
    listen 443 ssl;
    server_name localhost; # Or your domain name

    resolver 127.0.0.11 valid=10s ipv6=off;

    # SSL Configuration
    ssl_certificate /etc/nginx/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

    # Recommended SSL settings to improve security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_ecdh_curve secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Autenticación — máximo 5 intentos/min, burst de 3
    location /api/token/ {
        limit_req zone=login_zone burst=3 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Refresh token — máximo 10 intentos/min
    location /api/token/refresh/ {
        limit_req zone=refresh_zone burst=5 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reportes Excel: proxy directo al microservicio con clave interna.
    location /api/reporting/ {
        proxy_pass http://reporting_excel:8002/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Key "dev-internal-secret-key-change-in-prod";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Handle API calls by proxying them to the Gunicorn backend
    location /api/ {
        set $django_upstream http://backend:8000;
        limit_req zone=api_zone burst=200 nodelay;
        limit_req_status 429;
        proxy_pass $django_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/api/scanning/(.*)$ {
        set $scanning_upstream http://scanning:8000/$1;
        proxy_pass $scanning_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # This location block handles requests for /static/...
    location /static/ {
        alias /var/www/django_static/;
        try_files $uri @react_static;
    }

    # This named location will be used as a fallback for the /static/ block.
    location @react_static {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
