[tool:pytest]
# Directorio raíz de tests Django
testpaths = gestion/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Django settings para el runner de pytest-django (si se instala)
# DJANGO_SETTINGS_MODULE = TexCore.settings

[coverage:run]
# Alias — .coveragerc es la fuente principal; esta sección es por compatibilidad
source = gestion, inventory
omit =
    */migrations/*
    */tests/*

[coverage:report]
fail_under = 75
show_missing = true
